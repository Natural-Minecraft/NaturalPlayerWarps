# DOCUMENTATION: https://docs.artillex-studios.com/naturalplayerwarps.html
# ITEM BUILDER: https://docs.artillex-studios.com/item-builder.html

title: "&0&lWarps > &8Editing %warp%"
# a gui can have 1-6 rows
rows: 5
# how many items should be shown on a single page?
page-size: 21
# should the gui auto update?
# in ticks, 20 ticks = 1 second
# set to -1 to disable auto updater
auto-update-ticks: -1

# ----- ITEMS -----

blacklisted:
  material: BLACK_CANDLE
  name: "&#3388BB&l%player%"
  lore:
    - "&#AAAAAAThis player is blacklisted!"
    - " "
    - "&#3388BBSince: &#33EEBB%added-date%"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBRemove From Blacklist"

# you can add as many decorations as you wish
filler:
  name: " "
  slot:
    - "0-9"
    - "17-18"
    - "26-27"
    - "35-44"
  type: BLACK_STAINED_GLASS_PANE

add:
  slot: 0
  # this font is called 'small caps'
  name: "&#3388BB&lʙʟᴀᴄᴋʟɪsᴛ ᴘʟᴀʏᴇʀ"
  type: NAME_TAG
  lore:
    - "&#AAAAAABlacklisted players can"
    - "&#AAAAAAnever use your warp!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBAdd Player to Blacklist"
    - "&#3388BB&lShift + Right Click &#DDDDDD» &#33EEBBClear Blacklist"
  actions:
    - "[SOUND] ui.button.click|1|1"

back:
  slot: 8
  name: "&#3388BB&lʙᴀᴄᴋ"
  type: BARRIER
  lore:
    - " "
    - " &fClick here to go back"
    - " &fto the previous menu!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBBack to the Main Menu"
  actions:
    - "[BACK]"
    - "[SOUND] ui.button.click|1|1"

previous-page:
  slot: 39
  material: "ARROW"
  name: "&#3388BB&lᴘʀᴇᴠɪᴏᴜs ᴘᴀɢᴇ"
  lore:
    - " "
    - " &fClick here to go back"
    - " &fto the previous page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBPrevious Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[PAGE] previous"

refresh:
  slot: 40
  material: "SUNFLOWER"
  name: "&#3388BB&lʀᴇғʀᴇsʜ"
  lore:
    - " "
    - " &fClick here to"
    - " &frefresh the page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBRefresh Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[REFRESH]"

next-page:
  slot: 41
  material: "ARROW"
  name: "&#3388BB&lɴᴇxᴛ ᴘᴀɢᴇ"
  lore:
    - " "
    - " &fClick here to go"
    - " &fto the next page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBNext Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[PAGE] next"

