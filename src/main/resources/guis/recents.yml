# DOCUMENTATION: https://docs.artillex-studios.com/naturalplayerwarps.html
# ITEM BUILDER: https://docs.artillex-studios.com/item-builder.html

title: "&0&lWarps > &8Recent Warps (%page%/%pages%)"
# a gui can have 1-6 rows
rows: 5
# how many items should be shown on a single page?
page-size: 21
# should the gui auto update?
# in ticks, 20 ticks = 1 second
# set to -1 to disable auto updater
auto-update-ticks: -1

# ----- ITEMS -----

warp:
  name: "&#3388BB&l%name%"
  lore:
    - " "
    - "&#3388BBDescription:"
    - "&#444444❙ &f%description%"
    - " "
    - "&#3388BBInformation"
    - "  &#444444❙ &#33EEBBOwner: &f%owner%"
    - "  &#444444❙ &#33EEBBCreated: &f%created%"
    - "  &#444444❙ &#33EEBBLocation: &f%world%, %x%, %y%, %z%"
    - "  &#444444❙ &#33EEBBCategory: &f%category%"
    - " "
    - "&#3388BBStatistics"
    - "  &#444444❙ &#33EEBBVisits: &f%visitors_unique%"
    - "  &#444444❙ &#33EEBBRating: &#FFDD00%rating_stars%"
    - "  &#444444❙ &#33EEBBFavorite of: &f%favorites% players"
    - " "
    - "&#3388BBCost of teleporting: &#33EEBB%price%"
    - "&#3388BBAccess: &#33EEBB%access%"
    - " "
    - "&#3388BB&lLeft Click &#DDDDDD» &#33EEBBTeleport"
    - "&#3388BB&lRight Click &#DDDDDD» &#33EEBBReview & Options"

