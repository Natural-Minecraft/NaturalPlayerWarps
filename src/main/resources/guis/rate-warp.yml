# ITEM BUILDER: https://docs.artillex-studios.com/item-builder.html

title: "&0&lWarps > &8Viewing %warp%"
# a gui can have 1-6 rows
rows: 5
# should the gui auto update?
# in ticks, 20 ticks = 1 second
# set to -1 to disable auto updater
auto-update-ticks: -1

# ----- ITEMS -----

# you can add as many decorations as you wish
filler:
  name: " "
  slot:
    - "0-9"
    - "17-18"
    - "26-27"
    - "35-44"
  type: LIME_STAINED_GLASS_PANE

rate:
  slot: 20
  # this font is called 'small caps'
  name: "&#3388BB&lʀᴀᴛᴇ ᴡᴀʀᴘ"
  type: GOLDEN_APPLE
  lore:
    - " "
    - "&#3388BBInformation"
    - "  &#444444❙ &#33EEBBRating: &#FFDD00%rating_stars% &#FFAA00%rating_decimal%"
    - " "
    - "&#3388BBYour current rating: &#FFDD00%given_rating_stars% &#FFAA00%given_rating_decimal%"
    - " "
    - "&#3388BB&lLeft Click &#DDDDDD» &#33EEBBRate Warp"
    - "&#3388BB&lRight Click &#DDDDDD» &#33EEBBDelete Your Rating"
  actions:
    - "[SOUND] ui.button.click|1|1"

teleport:
  slot: 22
  name: "&#3388BB&lᴛᴇʟᴇᴘᴏʀᴛ"
  type: ENDER_PEARL
  lore:
    - " "
    - "&#3388BBInformation"
    - "  &#444444❙ &#33EEBBLocation: &f%world%, %x%, %y%, %z%"
    - " "
    - "&#3388BBCost of teleporting: &#33EEBB%price%"
    - "&#3388BBAccess: &#33EEBB%access%"
    - " "
    - "&#3388BB&lLeft Click &#DDDDDD» &#33EEBBTeleport"
  actions:
    - "[SOUND] ui.button.click|1|1"

favorite:
  slot: 24
  not-favorite:
    name: "&#3388BB&lᴀᴅᴅ ᴛᴏ ғᴀᴠᴏʀɪᴛᴇs"
    type: BELL
    lore:
      - " "
      - "&#3388BBIs it in your favorites? &#33EEBBNo"
      - " "
      - "&#3388BB&lClick &#DDDDDD» &#33EEBBAdd to Favorites"
  favorite:
    name: "&#3388BB&lʀᴇᴍᴏᴠᴇ ғʀᴏᴍ ғᴀᴠᴏʀɪᴛᴇs"
    type: BELL
    glow: true
    lore:
      - " "
      - "&#3388BBIs it in your favorites? &#33EEBBYes"
      - " "
      - "&#3388BB&lClick &#DDDDDD» &#33EEBBRemove from Favorites"
  actions:
    - "[SOUND] ui.button.click|1|1"

back:
  slot: 40
  name: "&#3388BB&lʙᴀᴄᴋ"
  type: BARRIER
  lore:
    - " "
    - " &fClick here to go back"
    - " &fto the previous menu!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBBack to the Main Menu"
  actions:
    - "[BACK]"
    - "[SOUND] ui.button.click|1|1"

