# DOCUMENTATION: https://docs.artillex-studios.com/naturalplayerwarps.html
# ITEM BUILDER: https://docs.artillex-studios.com/item-builder.html

title: "&0&lWarps > &8My Warps (%page%/%pages%)"
# a gui can have 1-6 rows
rows: 6
# how many items should be shown on a single page?
page-size: 45
# should the gui auto update?
# in ticks, 20 ticks = 1 second
# set to -1 to disable auto updater
auto-update-ticks: -1

# ----- WARP ITEM -----

warp:
  name: "&#3388BB&l%name%"
  lore:
    - " "
    - "&#3388BBDescription:"
    - "&#444444❙ &f%description%"
    - " "
    - "&#3388BBInformation"
    - "  &#444444❙ &#33EEBBCreated: &f%created%"
    - "  &#444444❙ &#33EEBBLocation: &f%world%, %x%, %y%, %z%"
    - "  &#444444❙ &#33EEBBCategory: &f%category%"
    - " "
    - "&#3388BBStatistics"
    - "  &#444444❙ &#33EEBBVisits: &f%visitors_unique%"
    - "  &#444444❙ &#33EEBBRating: &#FFDD00%rating_stars% &#FFAA00%rating_decimal%"
    - "  &#444444❙ &#33EEBBFavorite of: &f%favorites% players"
    - " "
    - "&#3388BBCost of teleporting: &#33EEBB%price%"
    - "&#3388BBAccess: &#33EEBB%access%"
    - " "
    - "&#3388BB&lLeft Click &#DDDDDD» &#33EEBBTeleport"
    - "&#3388BB&lRight Click &#DDDDDD» &#33EEBBEdit Warp"

# ----- ITEMS -----

my-warps:
  slot: 45
  # this font is called 'small caps'
  name: "&#3388BB&lᴡᴀʀᴘs"
  type: ENDER_EYE
  lore:
    - " "
    - " &fClick here to view all the"
    - " &f&#3388BB%total_warps% &fwarps on the server!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBOpen Warps"
  actions:
    - "[MENU] warps"
    - "[SOUND] ui.button.click|1|1"

sorting:
  slot: 46
  material: "GLOWSTONE_DUST"
  name: "&#3388BB&lsᴏʀᴛɪɴɢ"
  lore:
    - " "
    - " &#3388BBCurrently selected:"
    - "  &#444444❙ &#33EEBB%sorting_selected%"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBChange Sorting"
    - "&#3388BB&lShift + Click &#DDDDDD» &#33EEBBReset Sorting"
  actions:
    - "[SOUND] ui.button.click|1|1"

previous-page:
  slot: 48
  material: "ARROW"
  name: "&#3388BB&lᴘʀᴇᴠɪᴏᴜs ᴘᴀɢᴇ"
  lore:
    - " "
    - " &fClick here to go back"
    - " &fto the previous page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBPrevious Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[PAGE] previous"

refresh:
  slot: 49
  material: "SUNFLOWER"
  name: "&#3388BB&lʀᴇғʀᴇsʜ"
  lore:
    - " "
    - " &fClick here to"
    - " &frefresh the page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBRefresh Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[REFRESH]"

next-page:
  slot: 50
  material: "ARROW"
  name: "&#3388BB&lɴᴇxᴛ ᴘᴀɢᴇ"
  lore:
    - " "
    - " &fClick here to go"
    - " &fto the next page!"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBNext Page"
  actions:
    - "[SOUND] ui.button.click|1|1"
    - "[PAGE] next"

category:
  slot: 52
  material: "HOPPER"
  name: "&#3388BB&lᴄᴀᴛᴇɢᴏʀʏ"
  lore:
    - " "
    - " &#3388BBCurrently selected:"
    - "  &#444444❙ &#33EEBB%category_selected%"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBChange Category"
    - "&#3388BB&lShift + Click &#DDDDDD» &#33EEBBDelete Category Filter"
  actions:
    - "[SOUND] ui.button.click|1|1"

search:
  slot: 53
  material: "SPYGLASS"
  name: "&#3388BB&lsᴇᴀʀᴄʜ ᴡᴀʀᴘs"
  lore:
    - " "
    - " &fClick here to search for warps by"
    - " &ftheir name or by their owner's name!"
    - " "
    - "&#3388BBCurrent search: &#33EEBB%search%"
    - " "
    - "&#3388BB&lClick &#DDDDDD» &#33EEBBSearch"
    - "&#3388BB&lShift + Click &#DDDDDD» &#33EEBBClear Search"
  actions:
    - "[SOUND] ui.button.click|1|1"

