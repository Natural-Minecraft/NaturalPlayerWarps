    - "-----------"
    - "Write new price"
    - "in the first line!"
  anvil:
    title: "&0New Price"
    item:
      material: PAPER
      glow: true
      name: "&fPRICE HERE"
      lore:
        - "&#3388BB↑ price"
  chat:
    - "&#3388BBWrite the new price in the chat: &#DDDDDD(write &#3388BBcancel &#DDDDDDto stop)"

