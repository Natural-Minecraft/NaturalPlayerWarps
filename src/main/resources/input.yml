# DOCUMENTATION: https://docs.artillex-studios.com/naturalplayerwarps.html
#
# valid types:
#  - sign (sign gui)
#  - anvil (anvil gui)
#  - chat (input in chat)
#
# note: only the selected type's section will be used, you can even delete the unused ones if you want

# if the player writes any of these in chat mode, the plugin will cancel the input
# make sure to change this in the messages as well if you change it here!
chat-cancel-words:
  - "cancel"

rate:
  type: "anvil"
  # keep the first line empty when using sign
  sign:
    - ""
    - "-----------"
    - "Write new rating!"
    - "Valid values: 1-5"
  anvil:
    title: "&0Rate Warp"
    item:
      material: PAPER
      glow: true
      name: "&fRATING HERE"
      lore:
        - "&#3388BBValid values: 1-5"
  chat:
    - "&#3388BBWrite your rating in the chat: &#DDDDDD(write &#3388BBcancel &#DDDDDDto stop)"
    - "&#DDDDDDValid values: 1-5"

search:
  type: "chat"
  # keep the first line empty when using sign
  sign:
    - ""
    - "-----------"
    - "Search for warp"
    - "in the first line!"
  anvil:
    title: "&0Search Here"
    item:
      material: PAPER
      glow: true
      name: "&fSEARCH HERE"
      lore:
        - "&#3388BB↑ searching for"
  chat:
    - "&#3388BBWhat do you want to search for? &#DDDDDD(write &#3388BBcancel &#DDDDDDto stop)"

rename:
  type: "anvil"
  # keep the first line empty when using sign
