    - "-----------"
    - "Write the name"
    - "in the first line!"
  anvil:
    title: "&0Add Player"
    item:
      material: PAPER
      glow: true
      name: "&fPLAYER'S NAME HERE"
      lore:
        - "&#3388BB↑ name of player"
  chat:
    - "&#3388BBWrite the name of the player in the chat: &#DDDDDD(write &#3388BBcancel &#DDDDDDto stop)"

# do not change this
version: 1
