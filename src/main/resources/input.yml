    - ""
    - "-----------"
    - "Write new name"
    - "in the first line!"
  anvil:
    title: "&0Rename Warp"
    item:
      material: PAPER
      glow: true
      name: "&fNEW NAME HERE"
      lore:
        - "&#3388BB↑ new name"
  chat:
    - "&#3388BBWrite the new warp name in the chat: &#DDDDDD(write &#3388BBcancel &#DDDDDDto stop)"

